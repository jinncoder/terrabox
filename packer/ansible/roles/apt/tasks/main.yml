- name: Setup custom repositories
  ansible.builtin.include_tasks: repository.yml
  loop:
    - name: firefox
      key_url: https://packages.mozilla.org/apt/repo-signing-key.gpg
      repo_url: "https://packages.mozilla.org/apt"
      repo_extra: "arch=amd64"
      repo_pool: "mozilla main"
      pref_url: packages.mozilla.org
    - name: docker
      key_url: https://download.docker.com/linux/ubuntu/gpg
      repo_url: "https://download.docker.com/linux/ubuntu"
      repo_extra: "arch=amd64"
      repo_pool: "{{ ansible_facts['distribution_release'] | lower }} stable"
      repo_remove: "docker.io docker-doc docker-compose docker-compose-v2 podman-docker containerd runc"
    - name: vscodium
      key_url: https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
      repo_url: "https://download.vscodium.com/debs"
      repo_extra: "arch=amd64"
      repo_pool: "vscodium main"
    - name: mono
      key_url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3fa7e0328081bff6a14da29aa6a19b38d3d831ef
      repo_url: "https://download.mono-project.com/repo/ubuntu"
      repo_pool: "stable-focal main"
      repo_extra: ""

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade all packages to the latest version
  ansible.builtin.apt:
    upgrade: dist

- name: Configure wireshark for users
  ansible.builtin.debconf:
    name: 'wireshark-common'
    question: 'wireshark-common/install-setuid'
    vtype: 'boolean'
    value: 'true'

- name: Install desired packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400 # One day
    name:
      - firefox
      - build-essential
      - bzip2
      - wireshark
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - iptables
      - iptables-persistent
      - openvpn
      - zsh
      - git
      - vim
      - libreoffice
      - python3-venv
      - python3-pip
      - krb5-user
      - proxychains4
      - sqlite3
      - codium
      - smbclient
      - nmap
      - p7zip-full
      - jq
      - openjdk-21-jdk
      - openjdk-21-jdk-headless
      - openjdk-21-jre
      - tmux
      - fonts-powerline
      - curl
      - ca-certificates
      - net-tools
      - whois
      - tree
      - ruby-dev
      - mingw-w64
      - libkrb5-dev
      - rlwrap
      - htop
      - mono-devel
      - dbus-x11
      - ffuf
      - gobuster
      - hydra
      - sway
      - swaybg
      - swayidle
      - swaylock
      - waybar
      - foot
      - grim
      - slurp
      - wl-clipboard
      - mako-notifier
      - playerctl
      - xdg-desktop-portal-wlr
      - pipewire
      - wireplumber
      - pavucontrol
      - policykit-1-gnome
      - fuzzel
      - cliphist
      - nnn
      - unzip
      - libssl-dev # for JTR
      - libpcap-dev # for PCredz

- name: "Adding groups for {{ vm_user }}"
  ansible.builtin.user:
    name: "{{ vm_user }}"
    groups: docker,vboxsf,wireshark
    append: true

- name: Purge undesirables
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    purge: true
  with_items:
    - ufw
    - gnome-initial-setup
